services:
  - type: web
    name: pocketmart-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
        
  - type: web
    name: pocketmart-frontend
    runtime: node
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l 3000
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: pocketmart-backend
          property: url